name: "Publish"

on:
  push:
    branches:
      - main
    tags:
      - "*.*.*"

jobs:
  run:
    runs-on: ubuntu-latest
    environment:
      name: pypi
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref_name }}
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Ensure tag matches package version
        run: |
          pkg_version=$(uv version --short)

          if [[ "$pkg_version" != "${{ github.ref_name }}" ]]; then
            echo "Tag '${{ github.ref_name }}' ≠ package version '$pkg_version'"
            exit 1
          fi
      - name: Install Python 3.13
        run: uv python install 3.13
      - name: Build
        run: uv build
      - name: Publish
        run: uv publish
